
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.park-header { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin: 1.5rem 0 0.5rem; padding-bottom: 6px; border-bottom: 2px solid var(--color-border-secondary); }
.filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.filter-bar button { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.filter-bar button.active { background: #185FA5; color: #fff; border-color: #185FA5; }
.filter-bar button:hover:not(.active) { background: var(--color-background-secondary); }
.land-header { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 6px 10px; border-radius: 6px; margin: 12px 0 4px; letter-spacing: 0.04em; text-transform: uppercase; }
table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
th { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
td { padding: 7px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: top; line-height: 1.4; }
tr:last-child td { border-bottom: none; }
tr.hidden { display: none; }
.type-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.type-Ride { background: #E6F1FB; color: #0C447C; }
.type-Show { background: #EEEDFE; color: #3C3489; }
.type-Play { background: #EAF3DE; color: #27500A; }
.type-Dining { background: #FAEEDA; color: #633806; }
.check { color: #1D9E75; font-size: 14px; }
.cross { color: #E24B4A; font-size: 14px; }
.note { font-size: 10px; color: var(--color-text-secondary); display: block; margin-top: 1px; }
.stars { color: #EF9F27; font-size: 13px; letter-spacing: 1px; }
.ll-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #E6F1FB; color: #0C447C; font-weight: 500; }
.ll-badge.mo { background: #FAEEDA; color: #633806; }
.ll-badge.none { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.col-name { width: 22%; }
.col-type { width: 10%; }
.col-j { width: 13%; }
.col-d { width: 13%; }
.col-star { width: 11%; }
.col-ll { width: 17%; }
.summary-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.stat { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); padding: 5px 10px; border-radius: 6px; }
.stat b { color: var(--color-text-primary); }
</style>

function stars(n) {
  return '<span class="stars">' + '★'.repeat(n) + '<span style="color:var(--color-border-secondary);">' + '★'.repeat(5-n) + '</span></span>';
}
function check(ok, note) {
  return '<span class="' + (ok?'check':'cross') + '">' + (ok?'✔':'✗') + '</span><span class="note">' + note + '</span>';
}
function llBadge(ll, note) {
  if(ll==='LLMP') return '<span class="ll-badge">⚡ LLMP</span><span class="note">' + note + '</span>';
  if(ll==='MO') return '<span class="ll-badge mo">📱 Mobile Order</span>';
  return '<span class="ll-badge none">Walk-up</span>';
}
function typeLabel(t) {
  let cls = t==='Play'?'type-Play':('type-'+t);
  let label = t==='Play'?'Play Area':t;
  return '<span class="type-badge ' + cls + '">' + label + '</span>';
}

let activeFilter = 'all';

function render() {
  const parks = ['California Adventure','Disneyland'];
  let html = '';
  let shown = 0, total = 0;

  parks.forEach(park => {
    const lands = [...new Set(data.filter(d=>d.park===park).map(d=>d.land))];
    let parkHtml = '';
    let parkShown = 0;

    lands.forEach(land => {
      const rows = data.filter(d => d.park===park && d.land===land);
      const filtered = rows.filter(r => {
        if(activeFilter==='all') return true;
        if(activeFilter==='Ride') return r.type==='Ride';
        if(activeFilter==='Show') return r.type==='Show';
        if(activeFilter==='Play') return r.type==='Play';
        if(activeFilter==='Dining') return r.type==='Dining';
        if(activeFilter==='both') return r.jack && r.dillon;
        if(activeFilter==='ll') return r.ll==='LLMP';
        if(activeFilter==='5star') return r.stars===5;
        return true;
      });
      if(!filtered.length) return;
      parkShown += filtered.length;
      shown += filtered.length;

      parkHtml += '<div class="land-header">' + land + '</div>';
      parkHtml += '<table><thead><tr>';
      parkHtml += '<th class="col-name">Attraction</th><th class="col-type">Type</th>';
      parkHtml += '<th class="col-j">Jack (6.5, 48")</th><th class="col-d">Dillon (4, 38")</th>';
      parkHtml += '<th class="col-star">Family ★</th><th class="col-ll">Skip-Line / Order</th>';
      parkHtml += '</tr></thead><tbody>';
      filtered.forEach(r => {
        total++;
        parkHtml += '<tr>';
        parkHtml += '<td style="font-weight:500;">' + r.name + '</td>';
        parkHtml += '<td>' + typeLabel(r.type) + '</td>';
        parkHtml += '<td>' + check(r.jack, r.jackNote) + '</td>';
        parkHtml += '<td>' + check(r.dillon, r.dillonNote) + '</td>';
        parkHtml += '<td>' + stars(r.stars) + '</td>';
        parkHtml += '<td>' + llBadge(r.ll, r.llNote) + '</td>';
        parkHtml += '</tr>';
      });
      parkHtml += '</tbody></table>';
    });

    if(parkShown > 0) {
      html += '<div class="park-header">' + (park==='California Adventure'?'🎡':'🏰') + ' ' + park + '</div>';
      html += parkHtml;
    }
  });

  document.getElementById('content').innerHTML = html;

  const llCount = data.filter(r=>{
    let ok = activeFilter==='all'||
      (activeFilter==='Ride'&&r.type==='Ride')||(activeFilter==='Show'&&r.type==='Show')||
      (activeFilter==='Play'&&r.type==='Play')||(activeFilter==='Dining'&&r.type==='Dining')||
      (activeFilter==='both'&&r.jack&&r.dillon)||(activeFilter==='ll'&&r.ll==='LLMP')||
      (activeFilter==='5star'&&r.stars===5);
    return ok && r.ll==='LLMP';
  }).length;
  const bothCount = data.filter(r=>{
    let ok = activeFilter==='all'||(activeFilter==='Ride'&&r.type==='Ride')||(activeFilter==='Show'&&r.type==='Show')||
      (activeFilter==='Play'&&r.type==='Play')||(activeFilter==='Dining'&&r.type==='Dining')||
      (activeFilter==='both'&&r.jack&&r.dillon)||(activeFilter==='ll'&&r.ll==='LLMP')||
      (activeFilter==='5star'&&r.stars===5);
    return ok && r.jack && r.dillon;
  }).length;

  document.getElementById('summary').innerHTML =
    '<span class="stat">Showing <b>' + shown + '</b> attractions</span>' +
    '<span class="stat"><b>' + bothCount + '</b> both kids can do</span>' +
    '<span class="stat"><b>' + llCount + '</b> Lightning Lane eligible</span>';
}

document.getElementById('filters').addEventListener('click', function(e) {
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('#filters button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.f;
  render();
});

render();
</script>
