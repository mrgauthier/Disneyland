<style>
  :root {
    --dca: #E8401C;
    --dl:  #1A3A6B;
    --gold: #D4A017;
    --gold-lt: #F5E8C0;
    --green: #1B7A4A;
    --green-lt: #D6F0E3;
    --red: #C0392B;
    --red-lt: #FDECEA;
    --gray-0: #FAFAF8;
    --gray-1: #F0EFE9;
    --gray-2: #E2E0D8;
    --gray-3: #B8B5A8;
    --gray-4: #6E6B60;
    --gray-5: #2C2A24;
    --ll-bg: #E8F0FB;
    --ll-txt: #1A3A6B;
    --mo-bg: #FEF3DC;
    --mo-txt: #8A5500;
    --ride-bg: #E8F0FB;  --ride-txt: #1A3A6B;
    --show-bg: #EEE8FC;  --show-txt: #3B1F8C;
    --play-bg: #D6F0E3;  --play-txt: #0F5C35;
    --dining-bg: #FEF3DC; --dining-txt: #7A4800;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-0);
    color: var(--gray-5);
    min-height: 100vh;
  }

  /* ── Header ── */
  .hero {
    background: var(--gray-5);
    color: #fff;
    padding: 3rem 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 80% at 90% 50%, rgba(26,58,107,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 10% 80%, rgba(232,64,28,0.4) 0%, transparent 70%);
  }
  .hero-inner { position: relative; max-width: 1100px; margin: 0 auto; }
  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
  }
  .hero-sub span { display: flex; align-items: center; gap: 6px; }
  .hero-sub span::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  /* ── Layout ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Filter Bar ── */
  .filters-wrap {
    background: #fff;
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .filters-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-right: 4px;
    flex-shrink: 0;
  }
  .filter-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--gray-2);
    background: var(--gray-0);
    color: var(--gray-4);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gray-3); color: var(--gray-5); background: var(--gray-1); }
  .filter-btn.active { background: var(--gray-5); color: #fff; border-color: var(--gray-5); }
  .filter-btn.active.dca { background: var(--dca); border-color: var(--dca); }
  .filter-btn.active.dl  { background: var(--dl);  border-color: var(--dl);  }

  /* ── Summary Pills ── */
  .summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .summary-pill {
    font-size: 12px;
    color: var(--gray-4);
    background: #fff;
    border: 1px solid var(--gray-2);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .summary-pill b { color: var(--gray-5); }

  /* ── Park Section ── */
  .park-section { margin-bottom: 3rem; }
  .park-heading {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    padding: 0.9rem 1.25rem;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .park-heading.dca { background: var(--dca); }
  .park-heading.dl  { background: var(--dl); }
  .park-heading .park-icon { font-size: 1.4rem; }

  /* ── Land Block ── */
  .land-block { margin-bottom: 1.25rem; }
  .land-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray-4);
    padding: 0 0.5rem;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .land-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-2);
  }

  /* ── Table ── */
  .table-wrap {
    background: #fff;
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  thead tr {
    background: var(--gray-1);
    border-bottom: 1px solid var(--gray-2);
  }
  th {
    padding: 9px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-4);
    white-space: nowrap;
  }
  td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--gray-1);
    vertical-align: top;
    line-height: 1.45;
    color: var(--gray-5);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--gray-0); }
  tbody tr.hidden { display: none; }

  .col-name { width: 26%; }
  .col-type { width: 11%; }
  .col-jack { width: 16%; }
  .col-dill { width: 16%; }
  .col-star { width: 10%; }
  .col-ll   { width: 21%; }

  .attr-name { font-weight: 600; font-size: 13px; color: var(--gray-5); }
  .attr-sub  { font-size: 11px; color: var(--gray-4); margin-top: 2px; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-Ride   { background: var(--ride-bg);   color: var(--ride-txt); }
  .badge-Show   { background: var(--show-bg);   color: var(--show-txt); }
  .badge-Play   { background: var(--play-bg);   color: var(--play-txt); }
  .badge-Dining { background: var(--dining-bg); color: var(--dining-txt); }

  .check-wrap { display: flex; flex-direction: column; gap: 2px; }
  .check { font-size: 15px; font-weight: 700; }
  .check.yes { color: var(--green); }
  .check.no  { color: var(--red); }
  .check-note { font-size: 10px; color: var(--gray-4); line-height: 1.3; }

  .stars-wrap { display: flex; gap: 2px; flex-wrap: wrap; }
  .star { width: 13px; height: 13px; }
  .star.on  path { fill: var(--gold); }
  .star.off path { fill: var(--gray-2); }

  .ll-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .ll-tag.llmp    { background: var(--ll-bg); color: var(--ll-txt); }
  .ll-tag.mo      { background: var(--mo-bg); color: var(--mo-txt); }
  .ll-tag.walkup  { background: var(--gray-1); color: var(--gray-4); }
  .ll-sub { font-size: 10px; color: var(--gray-4); margin-top: 2px; display: block; }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1.5rem;
    font-size: 12px;
    color: var(--gray-4);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray-3);
    font-size: 14px;
  }
  .no-results span { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .col-jack, .col-dill { width: 14%; }
    .col-name { width: 24%; }
    th, td { padding: 8px 8px; }
    .attr-name { font-size: 12px; }
    .hero { padding: 2rem 1.25rem; }
  }
  @media (max-width: 520px) {
    table { font-size: 12px; }
    .col-ll { display: none; }
    .col-ll-th { display: none; }
  }
</style>
</head>

// SVG star helper
function starSVG(on) {
  const fill = on ? 'var(--gold)' : 'var(--gray-2)';
  return `<svg class="star ${on?'on':'off'}" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="13" height="13"><path d="M8 1l1.85 3.75L14 5.5l-3 2.92.71 4.13L8 10.5l-3.71 2.05L5 8.42 2 5.5l4.15-.75L8 1z" fill="${fill}"/></svg>`;
}
function starsHtml(n) {
  let s = '<div class="stars-wrap">';
  for(let i=1;i<=5;i++) s += starSVG(i<=n);
  s += '</div>';
  return s;
}
function checkHtml(ok, note) {
  return `<div class="check-wrap"><span class="check ${ok?'yes':'no'}">${ok?'✔':'✗'}</span>${note?`<span class="check-note">${note}</span>`:''}</div>`;
}
function llHtml(ll, note) {
  if(ll==='llmp') return `<span class="ll-tag llmp">⚡ LLMP</span><span class="ll-sub">${note}</span>`;
  if(ll==='mo')   return `<span class="ll-tag mo">📱 Mobile Order</span>`;
  return `<span class="ll-tag walkup">Walk-up</span>`;
}

let activeFilter = 'all';

function passes(r) {
  if(activeFilter==='all')    return true;
  if(activeFilter==='Ride')   return r.type==='Ride';
  if(activeFilter==='Show')   return r.type==='Show';
  if(activeFilter==='Play')   return r.type==='Play';
  if(activeFilter==='Dining') return r.type==='Dining';
  if(activeFilter==='both')   return r.jack && r.dillon;
  if(activeFilter==='ll')     return r.ll==='llmp';
  if(activeFilter==='5star')  return r.stars===5;
  return true;
}

function render() {
  const parks = ['California Adventure','Disneyland'];
  const parkMeta = {
    'California Adventure': {cls:'dca', icon:'🎡'},
    'Disneyland':            {cls:'dl',  icon:'🏰'},
  };
  let html = '';
  let totalShown = 0, totalBoth = 0, totalLL = 0;

  parks.forEach(park => {
    const lands = [...new Set(DATA.filter(d=>d.park===park).map(d=>d.land))];
    let parkHtml = '';
    let parkHasRows = false;

    lands.forEach(land => {
      const rows = DATA.filter(d=>d.park===park && d.land===land && passes(d));
      if(!rows.length) return;
      parkHasRows = true;

      let tableRows = '';
      rows.forEach(r => {
        totalShown++;
        if(r.jack && r.dillon) totalBoth++;
        if(r.ll==='llmp') totalLL++;
        tableRows += `<tr>
          <td><div class="attr-name">${r.name}</div></td>
          <td><span class="badge badge-${r.type}">${r.type==='Play'?'Play Area':r.type}</span></td>
          <td>${checkHtml(r.jack, r.jackNote)}</td>
          <td>${checkHtml(r.dillon, r.dillonNote)}</td>
          <td>${starsHtml(r.stars)}</td>
          <td>${llHtml(r.ll, r.llNote)}</td>
        </tr>`;
      });

      parkHtml += `
      <div class="land-block">
        <div class="land-label">${land}</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th class="col-name">Attraction</th>
              <th class="col-type">Type</th>
              <th class="col-jack">Jack · 6.5 · 48"</th>
              <th class="col-dill">Dillon · 4 · 38"</th>
              <th class="col-star">Rating</th>
              <th class="col-ll col-ll-th">Skip-Line / Order</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>`;
    });

    if(parkHasRows) {
      const m = parkMeta[park];
      html += `<div class="park-section">
        <div class="park-heading ${m.cls}">
          <span class="park-icon">${m.icon}</span>${park}
        </div>
        ${parkHtml}
      </div>`;
    }
  });

  if(!html) {
    html = `<div class="no-results"><span>🎢</span>No attractions match this filter.</div>`;
  }

  document.getElementById('parks').innerHTML = html;

  document.getElementById('summary').innerHTML = `
    <div class="summary-pill">Showing <b>${totalShown}</b> attractions</div>
    <div class="summary-pill"><b>${totalBoth}</b> both kids can ride/do</div>
    <div class="summary-pill"><b>${totalLL}</b> Lightning Lane Multi Pass eligible</div>
  `;
}

// Filter clicks
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    render();
  });
});

render();
</script>
